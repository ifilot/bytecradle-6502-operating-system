MEMORY {
    HEADER: start = $0800, size = 8, file = %O;             # Explicit start position
    RAM:    start = $0808, size = $7FF8, file = %O;         # Start right after HEADER
}

SEGMENTS {
    HEADER:     load = HEADER,  type = ro, define = yes;
    STARTUP:    load = RAM,     type = ro;
    CODE:       load = RAM,     type = ro;
    DATA:       load = RAM,     type = ro;
}
